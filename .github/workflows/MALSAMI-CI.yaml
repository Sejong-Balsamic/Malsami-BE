# ===================================================================
# Malsami BE - CI 검증 (main)
# ===================================================================
#
# main 브랜치 push / main 대상 PR 시 빌드와 테스트를 수행하여
# 코드가 정상 컴파일·통과되는지 검증합니다.
#
# 배포는 하지 않습니다. (배포는 deploy 브랜치 → PROJECT-SPRING-SIMPLE-CICD.yaml)
#
# ===================================================================
# 🔑 필요한 GitHub Secrets (빌드용 설정 파일)
# ===================================================================
# APPLICATION_PROD_YML / YEOPJEON_YML / SCORE_YML / EXP_YML
#   / ADMIN_YML / POSTTIER_YML / SEJONG_MALSAMI_EMBEDDING_JSON
#   / FIREBASE_CONFIG_JSON / FIREBASE_MESSAGING_SW_JS
# ===================================================================

name: MALSAMI-CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

# 같은 ref 에서 중복 실행 시 이전 실행 취소 (CI 비용 절감)
concurrency:
  group: malsami-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "17"
  SPRING_PROFILE: "prod"
  RESOURCES_DIR: "SM-Web/src/main/resources"

jobs:
  build:
    name: 빌드 및 테스트 검증
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v5

      - name: Java 설정
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Gradle Wrapper 실행권한 부여
        run: chmod +x gradlew

      # ============================================================
      # 운영 환경 설정 파일 생성 (빌드 시 필요)
      # ============================================================
      - name: application-prod.yml 생성
        run: |
          mkdir -p ${{ env.RESOURCES_DIR }}
          cat << 'EOF' > ./${{ env.RESOURCES_DIR }}/application-prod.yml
          ${{ secrets.APPLICATION_PROD_YML }}
          EOF

      - name: sejong-malsami-embedding.json 생성
        env:
          EMBEDDING_JSON: ${{ secrets.SEJONG_MALSAMI_EMBEDDING_JSON }}
        run: |
          mkdir -p ${{ env.RESOURCES_DIR }}
          echo "$EMBEDDING_JSON" | sed 's/\n/\n/g' > ./${{ env.RESOURCES_DIR }}/sejong-malsami-embedding.json

      - name: yeopjeon.yml 생성
        run: |
          mkdir -p ${{ env.RESOURCES_DIR }}
          cat << 'EOF' > ./${{ env.RESOURCES_DIR }}/yeopjeon.yml
          ${{ secrets.YEOPJEON_YML }}
          EOF

      - name: score.yml 생성
        run: |
          mkdir -p ${{ env.RESOURCES_DIR }}
          cat << 'EOF' > ./${{ env.RESOURCES_DIR }}/score.yml
          ${{ secrets.SCORE_YML }}
          EOF

      - name: exp.yml 생성
        run: |
          mkdir -p ${{ env.RESOURCES_DIR }}
          cat << 'EOF' > ./${{ env.RESOURCES_DIR }}/exp.yml
          ${{ secrets.EXP_YML }}
          EOF

      - name: admin.yml 생성
        run: |
          mkdir -p ${{ env.RESOURCES_DIR }}
          cat << 'EOF' > ./${{ env.RESOURCES_DIR }}/admin.yml
          ${{ secrets.ADMIN_YML }}
          EOF

      - name: post-tier.yml 생성
        run: |
          mkdir -p ${{ env.RESOURCES_DIR }}
          cat << 'EOF' > ./${{ env.RESOURCES_DIR }}/post-tier.yml
          ${{ secrets.POSTTIER_YML }}
          EOF

      - name: firebase-admin-sdk.json 생성
        env:
          FIREBASE_CONFIG_JSON: ${{ secrets.FIREBASE_CONFIG_JSON }}
        run: |
          mkdir -p ${{ env.RESOURCES_DIR }}
          echo "$FIREBASE_CONFIG_JSON" | sed 's/\\n/\n/g' > ./${{ env.RESOURCES_DIR }}/firebase-admin-sdk.json

      - name: firebase-messaging-sw.js 생성
        run: |
          mkdir -p ${{ env.RESOURCES_DIR }}/static
          cat << 'EOF' > ./${{ env.RESOURCES_DIR }}/static/firebase-messaging-sw.js
          ${{ secrets.FIREBASE_MESSAGING_SW_JS }}
          EOF

      # ============================================================
      # 빌드 검증 (배포 없음)
      # 테스트는 제외(-x test)합니다. 일부 테스트 소스가 외부 의존(DB 등) 및
      # 패키지 리팩토링 미반영으로 CI 환경에서 컴파일/통과되지 않기 때문이며,
      # 기존 운영 CI(SEJONG-MALSAMI-BE-CICD)와 동일한 정책입니다.
      # ============================================================
      - name: Build with Gradle
        run: ./gradlew clean build -x test -Dspring.profiles.active=${{ env.SPRING_PROFILE }}
