# ===================================================================
# Spring Boot CI/CD 배포 (SSH + Docker)
# ===================================================================
#
# main 브랜치 푸시 시 Docker 이미지를 빌드하고
# SSH로 접속 가능한 서버(Synology·AWS EC2·VPS 등)에 자동 배포합니다.
#
# ===================================================================
# 🔑 필수 GitHub Secrets
# ===================================================================
# APPLICATION_PROD_YML (선택): application-prod.yml 내용
# DOCKERHUB_USERNAME: DockerHub 사용자명
# DOCKERHUB_TOKEN: DockerHub 액세스 토큰
# SERVER_HOST: 배포 서버 주소
# SERVER_USER: SSH 사용자명
# SERVER_PASSWORD: SSH 비밀번호 (SSH_AUTH_METHOD=password일 때)
# SSH_KEY: SSH 개인키 .pem 내용 (SSH_AUTH_METHOD=key일 때, AWS EC2 등)
# ---- 프로젝트 고유 설정 파일 (Sejong Malsami) ----
# SEJONG_MALSAMI_EMBEDDING_JSON / YEOPJEON_YML / SCORE_YML / EXP_YML
#   / ADMIN_YML / POSTTIER_YML / FIREBASE_CONFIG_JSON / FIREBASE_MESSAGING_SW_JS
# ===================================================================
#
# 🔧 환경변수 설정 (env 섹션에서 설정)
# ===================================================================
#
# 🌐 포트 및 컨테이너:
# CONTAINER_INTERNAL_PORT: Spring Boot 내부 포트 (기본: 8080)
# DEPLOY_PORT: 배포 포트
# CONTAINER_NAME: 컨테이너 이름 (기본: PROJECT_NAME)
#
# 📦 볼륨 마운트:
# ENABLE_VOLUME_MOUNT: 볼륨 마운트 활성화 (true/false)
# VOLUME_HOST_PATH: 호스트 볼륨 경로
# VOLUME_CONTAINER_PATH: 컨테이너 내부 마운트 경로
#
# 🔌 SSH 연결:
# SSH_PORT: SSH 포트 (기본: 2022)
# SSH_COMMAND_TIMEOUT: SSH 명령 타임아웃 (기본: 600s)
# SSH_CONNECTION_TIMEOUT: SSH 연결 타임아웃 (기본: 60s)
#
# ⏱️ 헬스체크:
# HEALTHCHECK_WAIT_SECONDS: 초기화 대기 시간 (기본: 10초)
# HEALTHCHECK_PATH: HTTP 엔드포인트 경로 (비어있으면 로그만 사용)
# HEALTHCHECK_MAX_RETRIES: HTTP 재시도 횟수 (기본: 5회)
# HEALTHCHECK_RETRY_INTERVAL: 재시도 간격 (기본: 3초)
# HEALTHCHECK_LOG_PATTERN: Fallback 로그 검색 패턴
#
# 💡 HEALTHCHECK_PATH 예시:
#   Spring Boot (Actuator): "/actuator/health"
#   커스텀: "/api/v1/health"
#
# 💡 HEALTHCHECK_LOG_PATTERN 예시:
#   Spring Boot: "Tomcat started on port"
# ===================================================================
#
# 🌿 브랜치별 배포:
# - deploy 브랜치: 자동 배포 (DEPLOY_PORT 사용)
# - main 브랜치: 배포하지 않음 (CI 검증은 MALSAMI-CI.yaml 담당)
# ===================================================================

name: PROJECT-SPRING-SIMPLE-CICD

# ===================================================================
# 트리거 설정
# ===================================================================
# deploy 브랜치에 push할 때 자동으로 빌드·배포가 실행됩니다.
# main 브랜치는 CI 검증(MALSAMI-CI.yaml)만 수행하고 배포하지 않습니다.
on:
  push:
    branches:
      - deploy  # 운영 배포
  workflow_dispatch:  # 수동 실행 허용

# ===================================================================
# 환경 변수 설정
# ===================================================================
env:
  # 🔧 프로젝트 설정
  PROJECT_NAME: "sejong-malsami-back"

  # 🐳 DockerHub 이미지명 (기존 운영 이미지 태그 호환 위해 별도 지정)
  IMAGE_NAME: "sejong-malsami-back-container"

  # ☁️ Spring Boot 설정
  SPRING_PROFILE: "prod"
  JAVA_VERSION: "17"
  GRADLE_OPTS: "-Dspring.profiles.active=prod"

  # 📁 경로 설정
  APPLICATION_YML_DIR: "SM-Web/src/main/resources"
  DOCKERFILE_PATH: "./Dockerfile"

  # 🌐 포트 설정
  CONTAINER_INTERNAL_PORT: "8080"  # Spring Boot 내부 포트 (고정값)
  DEPLOY_PORT: "8087"  # 운영(main) 배포 포트

  # 🐳 컨테이너 이름 설정
  # 비워두면 PROJECT_NAME을 기본값으로 사용
  CONTAINER_NAME: "sejong-malsami-back"

  # 📦 볼륨 마운트 설정
  ENABLE_VOLUME_MOUNT: "true"
  VOLUME_HOST_PATH: "/volume1/projects/sejong-malsami"
  VOLUME_CONTAINER_PATH: "/mnt/sejong-malsami"

  # 🔐 SSH 인증 방식: "password"(Synology·일반 서버) | "key"(AWS EC2·.pem)
  SSH_AUTH_METHOD: "password"

  # 🔌 SSH 연결 설정
  SSH_PORT: "2022"  # SSH 포트 (Synology 기본: 2022)
  SSH_COMMAND_TIMEOUT: "600s"  # SSH 명령 실행 타임아웃
  SSH_CONNECTION_TIMEOUT: "60s"  # SSH 연결 타임아웃

  # ⏱️ 헬스체크 설정
  # 이 앱은 기동 완료까지 20초 이상 소요되며, prod 프로파일에서 actuator/health
  # 엔드포인트를 노출하지 않습니다. 따라서 HTTP 체크는 비활성화하고
  # Spring Boot 기동 완료 로그("Started ...Application") 패턴 매칭으로 검증합니다.
  HEALTHCHECK_WAIT_SECONDS: "40"  # 컨테이너 초기화 대기 시간 (초)
  HEALTHCHECK_PATH: ""  # 비워두면 HTTP 체크를 건너뛰고 로그 패턴만 사용
  HEALTHCHECK_MAX_RETRIES: "5"  # HTTP 재시도 횟수 (HEALTHCHECK_PATH 설정 시에만 사용)
  HEALTHCHECK_RETRY_INTERVAL: "3"  # 재시도 간격 (초)
  HEALTHCHECK_LOG_PATTERN: "Started SejongMalsamiBackendApplication"  # 기동 완료 로그 패턴

jobs:
  # ===================================================================
  # 빌드 작업
  # ===================================================================
  build:
    name: Spring Boot 애플리케이션 빌드
    runs-on: ubuntu-latest

    steps:
      # 1. 소스코드 체크아웃
      - name: 코드 체크아웃
        uses: actions/checkout@v5

      # 2. Java 개발 환경 설정
      - name: Java 설정
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      # 3. Gradle 실행 권한 부여
      - name: Gradle Wrapper 실행권한 부여
        run: chmod +x gradlew

      # ============================================================
      # 4. 운영 환경 설정 파일 생성 (GitHub Secrets → resources)
      # ============================================================
      - name: application-prod.yml 생성
        run: |
          mkdir -p ${{ env.APPLICATION_YML_DIR }}
          cat << 'EOF' > ./${{ env.APPLICATION_YML_DIR }}/application-prod.yml
          ${{ secrets.APPLICATION_PROD_YML }}
          EOF
          echo "✅ application-prod.yml 파일 생성 완료 (${{ env.APPLICATION_YML_DIR }})"

      # ---- 프로젝트 고유 설정 파일 (Sejong Malsami) ----
      # embedding.json: 문자열 내의 \n을 실제 개행문자로 변경
      - name: sejong-malsami-embedding.json 생성
        env:
          EMBEDDING_JSON: ${{ secrets.SEJONG_MALSAMI_EMBEDDING_JSON }}
        run: |
          mkdir -p ${{ env.APPLICATION_YML_DIR }}
          echo "$EMBEDDING_JSON" | sed 's/\n/\n/g' > ./${{ env.APPLICATION_YML_DIR }}/sejong-malsami-embedding.json

      - name: yeopjeon.yml 생성
        run: |
          mkdir -p ${{ env.APPLICATION_YML_DIR }}
          cat << 'EOF' > ./${{ env.APPLICATION_YML_DIR }}/yeopjeon.yml
          ${{ secrets.YEOPJEON_YML }}
          EOF

      - name: score.yml 생성
        run: |
          mkdir -p ${{ env.APPLICATION_YML_DIR }}
          cat << 'EOF' > ./${{ env.APPLICATION_YML_DIR }}/score.yml
          ${{ secrets.SCORE_YML }}
          EOF

      - name: exp.yml 생성
        run: |
          mkdir -p ${{ env.APPLICATION_YML_DIR }}
          cat << 'EOF' > ./${{ env.APPLICATION_YML_DIR }}/exp.yml
          ${{ secrets.EXP_YML }}
          EOF

      - name: admin.yml 생성
        run: |
          mkdir -p ${{ env.APPLICATION_YML_DIR }}
          cat << 'EOF' > ./${{ env.APPLICATION_YML_DIR }}/admin.yml
          ${{ secrets.ADMIN_YML }}
          EOF

      - name: post-tier.yml 생성
        run: |
          mkdir -p ${{ env.APPLICATION_YML_DIR }}
          cat << 'EOF' > ./${{ env.APPLICATION_YML_DIR }}/post-tier.yml
          ${{ secrets.POSTTIER_YML }}
          EOF

      - name: firebase-admin-sdk.json 생성
        env:
          FIREBASE_CONFIG_JSON: ${{ secrets.FIREBASE_CONFIG_JSON }}
        run: |
          mkdir -p ${{ env.APPLICATION_YML_DIR }}
          echo "$FIREBASE_CONFIG_JSON" | sed 's/\\n/\n/g' > ./${{ env.APPLICATION_YML_DIR }}/firebase-admin-sdk.json

      - name: firebase-messaging-sw.js 생성
        run: |
          mkdir -p ${{ env.APPLICATION_YML_DIR }}/static
          cat << 'EOF' > ./${{ env.APPLICATION_YML_DIR }}/static/firebase-messaging-sw.js
          ${{ secrets.FIREBASE_MESSAGING_SW_JS }}
          EOF

      # Vertex AI credentials JSON 생성 (임베딩 fallback용)
      # VERTEX_CREDENTIALS_JSON secret 이 설정된 경우에만 생성한다.
      # 파일명은 application-prod.yml 의 vertex.ai.credentials-file 과 일치해야 한다.
      - name: vertex credentials json 생성
        env:
          VERTEX_CREDENTIALS_JSON: ${{ secrets.VERTEX_CREDENTIALS_JSON }}
        run: |
          mkdir -p ${{ env.APPLICATION_YML_DIR }}
          if [ -n "$VERTEX_CREDENTIALS_JSON" ]; then
            echo "$VERTEX_CREDENTIALS_JSON" > ./${{ env.APPLICATION_YML_DIR }}/gen-lang-client-0511951522-e0dc1d68cbcb.json
            echo "✅ vertex credentials json 생성 완료"
          else
            echo "ℹ️ VERTEX_CREDENTIALS_JSON secret 미설정 - SUH-AIder 임베딩만 사용(Vertex fallback 비활성)"
          fi

      # 5. Gradle 빌드 실행 (테스트 제외, 운영 프로파일)
      - name: Build with Gradle
        run: ./gradlew clean build -x test ${{ env.GRADLE_OPTS }}

      # 6. Docker 빌드 환경 설정
      - name: Docker 빌드환경 설정
        uses: docker/setup-buildx-action@v3

      # 7. DockerHub 로그인
      - name: DockerHub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 8. Docker 레이어 캐싱 설정
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # 9. Docker 이미지 빌드 및 푸시 (브랜치명을 태그로 사용)
      - name: Docker 이미지 빌드 및 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # 10. Docker 캐시 정리
      - name: Move Docker cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  # ===================================================================
  # 배포 작업
  # ===================================================================
  deploy:
    name: 원격 서버 배포
    needs: build
    runs-on: ubuntu-latest

    steps:
      # SSH를 통한 원격 서버 배포 실행
      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          SSH_AUTH_METHOD: ${{ env.SSH_AUTH_METHOD }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ env.SSH_PORT }}
          command_timeout: ${{ env.SSH_COMMAND_TIMEOUT }}
          timeout: ${{ env.SSH_CONNECTION_TIMEOUT }}
          envs: SSH_AUTH_METHOD
          script: |
            set -e

            # ============================================================
            # 배포 환경 변수 설정
            # ============================================================
            echo "🔧 환경변수 설정.."
            export PATH=$PATH:/usr/local/bin
            export PW=${{ secrets.SERVER_PASSWORD }}

            # 🔐 SSH 인증 방식에 따른 sudo 추상화
            SSH_AUTH_METHOD="${SSH_AUTH_METHOD:-password}"
            if [ "${SSH_AUTH_METHOD}" = "key" ]; then
              SUDO() { sudo "$@"; }
            else
              SUDO() { echo "$PW" | sudo -S "$@"; }
            fi
            echo "🔐 SSH 인증 방식: ${SSH_AUTH_METHOD}"

            # GitHub에서 전달받은 브랜치명
            BRANCH=${{ github.ref_name }}

            # 프로젝트 설정
            PROJECT_NAME="${{ env.PROJECT_NAME }}"
            IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${BRANCH}"

            # ============================================================
            # 포트 및 컨테이너명 설정
            # ============================================================
            PORT=${{ env.DEPLOY_PORT }}

            # 컨테이너 이름 설정 (환경변수가 비어있으면 PROJECT_NAME을 기본값으로 사용)
            if [ -z "${{ env.CONTAINER_NAME }}" ]; then
              CONTAINER_NAME="${PROJECT_NAME}"
            else
              CONTAINER_NAME="${{ env.CONTAINER_NAME }}"
            fi

            echo "📋 배포 설정 정보:"
            echo "  - 브랜치: $BRANCH"
            echo "  - 프로젝트: $PROJECT_NAME"
            echo "  - 컨테이너 이름: $CONTAINER_NAME"
            echo "  - 포트: $PORT"
            echo "  - Docker 이미지: $IMAGE"

            # ============================================================
            # Docker 이미지 풀 (Pull)
            # ============================================================
            echo "⬇️ Docker 이미지 풀: $IMAGE"
            SUDO docker pull $IMAGE

            # ============================================================
            # 기존 컨테이너 정리
            # ============================================================
            echo "🧹 컨테이너 $CONTAINER_NAME 존재 여부 확인 중..."
            if SUDO docker ps -a --format '{{.Names}}' | grep -Eq "^${CONTAINER_NAME}\$"; then
              echo "⚠️ 컨테이너 $CONTAINER_NAME 이(가) 존재합니다. 중지 및 삭제 중..."
              SUDO docker rm -f $CONTAINER_NAME
              echo "✅ 컨테이너 $CONTAINER_NAME 이(가) 삭제되었습니다."
            else
              echo "ℹ️ 존재하는 컨테이너 $CONTAINER_NAME 이(가) 없습니다."
            fi

            # ============================================================
            # 새 컨테이너 실행
            # ============================================================
            echo "🚀 새로운 컨테이너 $CONTAINER_NAME 실행 중..."

            # 볼륨 마운트 옵션 설정
            VOLUME_MOUNT_OPTION=""
            if [ "${{ env.ENABLE_VOLUME_MOUNT }}" == "true" ]; then
              if [ ! -d "${{ env.VOLUME_HOST_PATH }}" ]; then
                echo "📁 볼륨 마운트 디렉토리 생성: ${{ env.VOLUME_HOST_PATH }}"
                SUDO mkdir -p "${{ env.VOLUME_HOST_PATH }}"
              fi
              VOLUME_MOUNT_OPTION="-v ${{ env.VOLUME_HOST_PATH }}:${{ env.VOLUME_CONTAINER_PATH }}"
              echo "📦 볼륨 마운트 활성화: $VOLUME_MOUNT_OPTION"
            else
              echo "ℹ️ 볼륨 마운트 비활성화됨"
            fi

            # Docker 컨테이너 실행
            # - 프로젝트 고유: --network sejong-malsami-network, docker.sock 마운트
            SUDO docker run -d \
              -p ${PORT}:${{ env.CONTAINER_INTERNAL_PORT }} \
              --name $CONTAINER_NAME \
              --network sejong-malsami-network \
              -e TZ=Asia/Seoul \
              -e "SPRING_PROFILES_ACTIVE=${{ env.SPRING_PROFILE }}" \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v /etc/localtime:/etc/localtime:ro \
              $VOLUME_MOUNT_OPTION \
              $IMAGE

            # ============================================================
            # 컨테이너 헬스체크
            # ============================================================
            echo "⏳ 컨테이너 초기화 대기 중... (${{ env.HEALTHCHECK_WAIT_SECONDS }}초)"
            sleep ${{ env.HEALTHCHECK_WAIT_SECONDS }}

            # 1단계: 컨테이너 프로세스 확인
            echo "🏥 컨테이너 헬스체크 중..."
            if ! SUDO docker ps --format '{{.Names}}' | grep -Eq "^${CONTAINER_NAME}\$"; then
              echo "❌ 컨테이너 $CONTAINER_NAME 프로세스가 실행되지 않았습니다"
              SUDO docker logs --tail 50 $CONTAINER_NAME || true
              exit 1
            fi
            echo "✅ 컨테이너 프로세스 실행 확인 완료"

            # 2단계: HTTP 엔드포인트 체크 (설정된 경우)
            HEALTHCHECK_SUCCESS=false
            if [ -n "${{ env.HEALTHCHECK_PATH }}" ]; then
              echo "🌐 HTTP 헬스체크 시작: http://localhost:${PORT}${{ env.HEALTHCHECK_PATH }}"
              for i in $(seq 1 ${{ env.HEALTHCHECK_MAX_RETRIES }}); do
                echo "  시도 $i/${{ env.HEALTHCHECK_MAX_RETRIES }}..."
                HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:${PORT}${{ env.HEALTHCHECK_PATH }} || echo "000")
                if [ "$HTTP_CODE" = "200" ]; then
                  echo "✅ HTTP 헬스체크 성공 (응답 코드: $HTTP_CODE)"
                  HEALTHCHECK_SUCCESS=true
                  break
                else
                  echo "⚠️ HTTP 헬스체크 실패 (응답 코드: $HTTP_CODE)"
                  if [ $i -lt ${{ env.HEALTHCHECK_MAX_RETRIES }} ]; then
                    echo "  ${{ env.HEALTHCHECK_RETRY_INTERVAL }}초 후 재시도..."
                    sleep ${{ env.HEALTHCHECK_RETRY_INTERVAL }}
                  fi
                fi
              done
              if [ "$HEALTHCHECK_SUCCESS" = "false" ]; then
                echo "⚠️ HTTP 헬스체크 최종 실패, 로그 패턴 매칭으로 fallback..."
              fi
            else
              echo "ℹ️ HEALTHCHECK_PATH가 설정되지 않아 로그 패턴 매칭만 사용합니다"
            fi

            # 3단계: 로그 패턴 매칭 (HTTP 실패 시 또는 HTTP 체크 비활성화 시)
            if [ "$HEALTHCHECK_SUCCESS" = "false" ]; then
              echo "📋 로그 패턴 매칭 시작: '${{ env.HEALTHCHECK_LOG_PATTERN }}'"
              if SUDO docker logs $CONTAINER_NAME 2>&1 | grep -q "${{ env.HEALTHCHECK_LOG_PATTERN }}"; then
                echo "✅ 로그 패턴 매칭 성공: 애플리케이션이 정상적으로 시작되었습니다"
                HEALTHCHECK_SUCCESS=true
              else
                echo "❌ 로그 패턴 매칭 실패: 애플리케이션 시작 로그를 찾을 수 없습니다"
                echo "📋 컨테이너 로그 (최근 50줄):"
                SUDO docker logs --tail 50 $CONTAINER_NAME || true
                exit 1
              fi
            fi

            if [ "$HEALTHCHECK_SUCCESS" = "true" ]; then
              echo "✅ 헬스체크 완료: 컨테이너 $CONTAINER_NAME 이(가) 정상적으로 실행 중입니다"
            fi

            # ============================================================
            # 배포 완료 확인
            # ============================================================
            echo "✅ 배포가 성공적으로 완료되었습니다!"
            echo "📋 배포 결과 요약:"
