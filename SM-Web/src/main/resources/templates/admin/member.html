<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{admin/layout}">
<head><title layout:fragment="title">회원 관리</title></head>
<body>
<div layout:fragment="content">
  <div class="card bg-base-100 shadow mb-4">
    <div class="card-body p-4">
      <form id="searchForm" class="flex flex-wrap gap-2 items-end">
        <label class="form-control"><span class="label-text text-xs">학번</span>
          <input type="text" name="studentId" class="input input-sm input-bordered w-32" placeholder="학번"/></label>
        <label class="form-control"><span class="label-text text-xs">이름</span>
          <input type="text" name="studentName" class="input input-sm input-bordered w-28" placeholder="이름"/></label>
        <label class="form-control"><span class="label-text text-xs">닉네임</span>
          <input type="text" name="uuidNickname" class="input input-sm input-bordered w-28" placeholder="닉네임"/></label>
        <label class="form-control"><span class="label-text text-xs">전공</span>
          <input type="text" name="major" class="input input-sm input-bordered w-32" placeholder="전공"/></label>
        <label class="form-control"><span class="label-text text-xs">단과대</span>
          <input type="text" name="faculties" class="input input-sm input-bordered w-28" placeholder="단과대"/></label>
        <label class="form-control"><span class="label-text text-xs">학년</span>
          <input type="text" name="academicYear" class="input input-sm input-bordered w-20" placeholder="학년"/></label>
        <label class="form-control"><span class="label-text text-xs">재학상태</span>
          <input type="text" name="enrollmentStatus" class="input input-sm input-bordered w-28" placeholder="재학상태"/></label>
        <label class="form-control"><span class="label-text text-xs">계정상태</span>
          <select name="accountStatus" class="select select-sm select-bordered w-28">
            <option value="">전체</option><option value="ACTIVE">활성화</option><option value="DELETED">삭제됨</option></select></label>
        <label class="form-control"><span class="label-text text-xs">역할</span>
          <select name="role" class="select select-sm select-bordered w-32">
            <option value="">전체</option><option value="ROLE_USER">일반사용자</option><option value="ROLE_ADMIN">관리자</option></select></label>
        <label class="form-control"><span class="label-text text-xs">마지막로그인 시작</span>
          <input type="date" name="lastLoginStart" class="input input-sm input-bordered"/></label>
        <label class="form-control"><span class="label-text text-xs">마지막로그인 끝</span>
          <input type="date" name="lastLoginEnd" class="input input-sm input-bordered"/></label>
        <label class="form-control"><span class="label-text text-xs">첫 로그인</span>
          <select name="isFirstLogin" class="select select-sm select-bordered w-24">
            <option value="">전체</option><option value="true">예</option><option value="false">아니오</option></select></label>
        <label class="form-control"><span class="label-text text-xs">수정여부</span>
          <select name="isEdited" class="select select-sm select-bordered w-24">
            <option value="">전체</option><option value="true">수정됨</option><option value="false">수정안됨</option></select></label>
        <label class="form-control"><span class="label-text text-xs">삭제여부</span>
          <select name="isDeleted" class="select select-sm select-bordered w-24">
            <option value="">전체</option><option value="true">삭제됨</option><option value="false">삭제안됨</option></select></label>
        <button type="submit" class="btn btn-sm btn-primary"><i data-lucide="search" class="size-4"></i>검색</button>
        <button type="button" id="resetBtn" class="btn btn-sm btn-ghost"><i data-lucide="rotate-ccw" class="size-4"></i>초기화</button>
      </form>
    </div>
  </div>
  <div class="card bg-base-100 shadow">
    <div class="card-body p-0">
      <div class="px-4 pt-3 text-sm text-base-content/60" id="totalCount">총 0건</div>
      <div class="overflow-x-auto">
        <table id="memberTable" class="table table-sm table-zebra"><thead></thead><tbody></tbody></table>
      </div>
      <div class="flex justify-center p-4" id="memberPagination"></div>
    </div>
  </div>
</div>
<th:block layout:fragment="js">
<script th:src="@{/js/admin-table.js}"></script>
<script>
  const fmtDate = v => v ? new Date(v).toLocaleString() : '';
  const fmtArr = v => Array.isArray(v) ? v.join(', ') : (v ?? '');
  const memberTable = new AdminTable({
    tableEl: document.getElementById('memberTable'),
    tbodyEl: document.querySelector('#memberTable tbody'),
    countEl: document.getElementById('totalCount'),
    paginationEl: document.getElementById('memberPagination'),
    formEl: document.getElementById('searchForm'),
    url: '/admin/member/filter',
    pageKey: 'membersPage',
    pageSize: 30,
    defaultSort: { field: 'createdDate', dir: 'desc' },
    columns: [
      { title: '학번', field: 'studentId' },
      { title: '이름', field: 'studentName' },
      { title: '닉네임', field: 'uuidNickname' },
      { title: '전공', field: 'major' },
      { title: '단과대', field: 'faculties', render: fmtArr },
      { title: '학년', field: 'academicYear' },
      { title: '재학상태', field: 'enrollmentStatus' },
      { title: '계정상태', field: 'accountStatus',
        render: v => `<span class="badge badge-sm ${v==='ACTIVE'?'badge-success':'badge-error'}">${v??''}</span>` },
      { title: '첫로그인', field: 'isFirstLogin', render: v => v?'예':'아니오' },
      { title: '마지막로그인', field: 'lastLoginTime', render: fmtDate, sortable: true },
      { title: '생성일', field: 'createdDate', render: fmtDate, sortable: true },
      { title: '역할', field: 'roles', render: fmtArr }
    ]
  });
  memberTable.reload();
  document.getElementById('resetBtn').addEventListener('click', () => {
    document.getElementById('searchForm').reset();
    memberTable.reload();
  });
</script>
</th:block>
</body>
</html>
